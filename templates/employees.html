<!DOCTYPE html>
<html>
<head>
    <title>Employee Management Portal</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>Employee Management Portal</h1>

<table>

<tr>

<th>ID</th>
<th>Name</th>
<th>Department</th>
<th>Salary</th>

</tr>

{% for emp in employees %}

<tr>

<td>{{emp.id}}</td>
<td>{{emp.name}}</td>
<td>{{emp.department}}</td>
<td>{{emp.salary}}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
